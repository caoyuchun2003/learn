AWSTemplateFormatVersion: '2010-09-09'
Transform: BCE::Serverless-2018-10-31
Description: Learn site CFC — decide (rules) + ask (Qianfan optional)

Resources:
  LearnApiFunction:
    Type: BCE::Serverless::Function
    Properties:
      Handler: index.handler
      Runtime: nodejs12
      CodeUri: ./
      Description: Learn decide + ask API
      MemorySize: 256
      Timeout: 60
      Environment:
        Variables:
          FEATURE_DECIDE: 'on'
          FEATURE_ASK: 'on'
          CORS_ORIGIN: 'https://caoyuchun2003.github.io'
          RATE_LIMIT_PER_MIN: '20'
          QIANFAN_MODEL: 'deepseek-v3.2'
      Events:
        DecideHttp:
          Type: HTTP
          Properties:
            ResourcePath: /api/decide
            Method:
              - POST
              - OPTIONS
              - GET
            AuthType: anonymous
        AskHttp:
          Type: HTTP
          Properties:
            ResourcePath: /api/ask
            Method:
              - POST
              - OPTIONS
              - GET
            AuthType: anonymous
        AskStreamHttp:
          Type: HTTP
          Properties:
            ResourcePath: /api/ask/stream
            Method:
              - POST
              - OPTIONS
            AuthType: anonymous
